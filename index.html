<!DOCTYPE html>
<html>
<head>
  <title>Budget</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <h1>Budget Dashboard</h1>

  <div class="card">
    <h2>Month</h2>
    <input type="month" id="monthPicker">
  </div>

  <div class="card">
    <h2>Paycheck</h2>
    <input type="number" id="paycheck" placeholder="Enter paycheck">
  </div>

  <div class="card balance-card">
    <h2>Remaining Balance</h2>
    <div id="remaining">$0</div>
  </div>

  <div class="card">
    <h2>Upcoming Bills</h2>
    <ul id="billsList"></ul>
    <input type="text" id="newBill" placeholder="Bill name">
    <input type="number" id="billAmount" placeholder="Amount">
    <button onclick="addItem('bills')">Add Bill</button>
  </div>

  <div class="card">
    <h2>Future Purchases</h2>
    <ul id="purchaseList"></ul>
    <input type="text" id="newPurchase" placeholder="Item name">
    <input type="number" id="purchaseAmount" placeholder="Amount">
    <button onclick="addItem('purchases')">Add Purchase</button>
  </div>

  <div class="card">
    <h2>Savings Goal</h2>
    <input type="number" id="savingsGoal" placeholder="Goal amount">
    <div class="progress-bar">
      <div id="progress"></div>
    </div>
  </div>

  <div class="card">
    <h2>Monthly Breakdown</h2>
    <canvas id="budgetChart"></canvas>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
